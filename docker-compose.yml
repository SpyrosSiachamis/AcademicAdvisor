services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: AcademicAdvisor-backend
    ports:
      - '8000:8000'
    volumes:
      - ./backend/src:/app/src
    command: python -m uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
