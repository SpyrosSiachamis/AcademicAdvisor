services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: AcademicAdvisor-backend
    ports:
      - '8000:8000'
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: python -m uvicorn src.app:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - app-network
